<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>repo-brain knowledge graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; -webkit-tap-highlight-color: transparent; }
  #graph-container { position: fixed; inset: 0; }
  svg { width: 100%; height: 100%; display: block; touch-action: none; }

  #search-box { position: absolute; top: 14px; left: 14px; z-index: 10; }
  #search-box input { background: #161b22ee; border: 1px solid #30363d; color: #e6edf3; padding: 9px 12px; border-radius: 8px; width: min(260px, 60vw); font-size: 14px; outline: none; }
  #search-box input:focus { border-color: #58a6ff; }

  #stats { position: absolute; top: 14px; right: 14px; background: #161b22cc; border: 1px solid #30363d; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #8b949e; z-index: 10; }
  #fit-btn { position: absolute; top: 52px; right: 14px; z-index: 10; background: #161b22cc; border: 1px solid #30363d; border-radius: 8px; color: #c9d1d9; padding: 6px 12px; font-size: 12px; cursor: pointer; }
  #fit-btn:hover { background: #21262d; }

  .node circle { cursor: pointer; stroke-width: 2; transition: stroke .15s; }
  .node circle:hover { stroke: #fff; stroke-width: 2.5; }
  .node text { font-size: 11px; fill: #e6edf3; pointer-events: none; text-anchor: middle; paint-order: stroke; stroke: #0d1117; stroke-width: 3px; stroke-linejoin: round; }
  .link { stroke: #30363d; stroke-opacity: .7; }
  .link.depends-on { stroke: #58a6ff; stroke-opacity: .5; }
  .link.same-repo { stroke: #3fb950; stroke-opacity: .4; }
  .link.alternative-to { stroke: #f78166; stroke-opacity: .4; stroke-dasharray: 4; }
  .link.same-domain { stroke: #d2a8ff; stroke-opacity: .4; stroke-dasharray: 2; }
  .link.similar-pattern { stroke: #56d364; stroke-opacity: .35; stroke-dasharray: 1 3; }
  .node.dimmed circle, .node.dimmed text { opacity: .12; }
  .link.dimmed { opacity: .04; }

  h2 { font-size: 16px; font-weight: 600; line-height: 1.4; padding-right: 24px; }
  .domain-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 500; }
  .repo-label { font-size: 12px; color: #8b949e; }
  .summary-text { font-size: 13px; color: #c9d1d9; line-height: 1.6; }
  .btn { display: block; padding: 9px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; text-align: center; margin-top: 4px; border: 1px solid #30363d; color: #e6edf3; background: #21262d; cursor: pointer; transition: background .15s; }
  .btn:hover { background: #30363d; }
  .btn.primary { background: #1f6feb; border-color: #1f6feb; }
  .btn.primary:hover { background: #388bfd; }

  #panel { position: absolute; top: 0; right: 0; height: 100%; width: 340px; background: #161b22; border-left: 1px solid #30363d; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; z-index: 20; transform: translateX(100%); transition: transform .18s ease; }
  #panel.open { transform: translateX(0); }
  #close-panel { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #8b949e; cursor: pointer; font-size: 20px; line-height: 1; }

  #legend { position: absolute; bottom: 14px; left: 14px; background: #161b22cc; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; font-size: 12px; max-height: 42vh; overflow-y: auto; z-index: 10; }
  #legend h4 { color: #8b949e; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
  #legend.collapsed .legend-body { display: none; }
  #legend-toggle { cursor: pointer; user-select: none; }
  .legend-cols { columns: 2; column-gap: 16px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; break-inside: avoid; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 20px; height: 2px; flex-shrink: 0; }

  /* ---- responsive: phones / narrow ---- */
  @media (max-width: 720px) {
    #panel { width: 100%; height: 62%; top: auto; bottom: 0; border-left: none; border-top: 1px solid #30363d; border-radius: 14px 14px 0 0; transform: translateY(100%); }
    #panel.open { transform: translateY(0); }
    #legend { font-size: 11px; max-height: 30vh; bottom: 10px; }
    .legend-cols { columns: 1; }
    #search-box input { width: 56vw; }
    #stats { font-size: 11px; }
  }
</style>
</head>
<body>
<div id="graph-container">
  <div id="search-box"><input type="text" id="search" placeholder="Search nodes…" autocomplete="off"></div>
  <div id="stats"></div>
  <button id="fit-btn" title="Fit graph to screen">Fit ⤢</button>
  <div id="legend">
    <h4 id="legend-toggle">Legend ▾</h4>
    <div class="legend-body">
      <div class="legend-cols" id="domain-legend"></div>
      <h4 style="margin-top:10px">Edges</h4>
      <div class="legend-item"><div class="legend-line" style="background:#58a6ff"></div><span>depends-on</span></div>
      <div class="legend-item"><div class="legend-line" style="background:#3fb950"></div><span>same-repo</span></div>
      <div class="legend-item"><div class="legend-line" style="border-top:2px dashed #f78166;height:0"></div><span>alternative-to</span></div>
      <div class="legend-item"><div class="legend-line" style="border-top:2px dashed #d2a8ff;height:0"></div><span>same-domain</span></div>
      <div class="legend-item"><div class="legend-line" style="border-top:2px dotted #56d364;height:0"></div><span>similar-pattern</span></div>
    </div>
  </div>
  <svg id="svg"></svg>
</div>
<div id="panel">
  <button id="close-panel">✕</button>
  <div id="panel-content"></div>
</div>
<script>
const GRAPH_DATA = {"nodes": [{"id": "adaptive-parsing/adaptive-element-relocation--from-scrapling", "label": "Adaptive Element Relocation", "domain": "adaptive-parsing", "repo": "scrapling", "summary": "Fingerprints an element (tag/text/attrs/siblings/path/parent) on first scrape, then re-finds it by fuzzy similarity scoring when the selector later breaks. Default 40% threshold. SQLite-backed, pluggable storage.", "study": "features/adaptive-parsing/study/adaptive-element-relocation--from-scrapling.md", "build": "features/adaptive-parsing/build/adaptive-element-relocation--from-scrapling.md", "source": "https://github.com/D4Vinci/Scrapling", "notebooklm": ""}, {"id": "document-conversion/converter-pipeline--from-markitdown", "label": "Converter Pipeline", "domain": "document-conversion", "repo": "markitdown", "summary": "Priority-sorted pluggable converter registry. Source-type dispatch → layered file detection → sorted converter chain. First accepts+succeeds wins. Output normalized to clean Markdown.", "study": "features/document-conversion/study/converter-pipeline--from-markitdown.md", "build": "features/document-conversion/build/converter-pipeline--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "document-conversion/pdf-conversion--from-markitdown", "label": "PDF Conversion", "domain": "document-conversion", "repo": "markitdown", "summary": "Dual-library PDF extraction: pdfplumber primary (table/form column detection, page.close() memory management) → pdfminer fallback. Markdown tables from column-clustered word positions.", "study": "features/document-conversion/study/pdf-conversion--from-markitdown.md", "build": "features/document-conversion/build/pdf-conversion--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "document-conversion/office-doc-conversion--from-markitdown", "label": "Office Doc Conversion", "domain": "document-conversion", "repo": "markitdown", "summary": "DOCX/PPTX/XLSX → Markdown via python-docx, python-pptx, pandas. Tables go HTML→Markdown via HtmlConverter.convert_string(). PPTX handles charts, speaker notes, and optional LLM image captions.", "study": "features/document-conversion/study/office-doc-conversion--from-markitdown.md", "build": "features/document-conversion/build/office-doc-conversion--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "document-conversion/zip-archive-traversal--from-markitdown", "label": "ZIP Archive Traversal", "domain": "document-conversion", "repo": "markitdown", "summary": "Recursive ZIP extraction: iterate entries → BytesIO streams → call parent pipeline on each file. Silent skip on conversion failure. Nested ZIPs handled automatically.", "study": "features/document-conversion/study/zip-archive-traversal--from-markitdown.md", "build": "features/document-conversion/build/zip-archive-traversal--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "plugin-architecture/plugin-system--from-markitdown", "label": "Plugin System", "domain": "plugin-architecture", "repo": "markitdown", "summary": "importlib.metadata entry_points discovery under group 'markitdown.plugin'. Lazy load with fault isolation. register_converters(host, **kwargs) callback pattern. __plugin_interface_version__ for forward compat.", "study": "features/plugin-architecture/study/plugin-system--from-markitdown.md", "build": "features/plugin-architecture/build/plugin-system--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "file-detection/magika-file-detection--from-markitdown", "label": "Magika File Detection", "domain": "file-detection", "repo": "markitdown", "summary": "Layered type detection: extension+MIME hints → mimetypes bidirectional enrichment → Magika ML content scan → charset_normalizer for text files. Returns ranked StreamInfo list.", "study": "features/file-detection/study/magika-file-detection--from-markitdown.md", "build": "features/file-detection/build/magika-file-detection--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "media-processing/image-llm-captioning--from-markitdown", "label": "Image + LLM Captioning", "domain": "media-processing", "repo": "markitdown", "summary": "JPEG/PNG converter with two optional layers: exiftool subprocess for EXIF metadata, OpenAI-compatible vision API for image description. Both independently optional. Output: key-values + ## Description.", "study": "features/media-processing/study/image-llm-captioning--from-markitdown.md", "build": "features/media-processing/build/image-llm-captioning--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "media-processing/audio-transcription--from-markitdown", "label": "Audio Transcription", "domain": "media-processing", "repo": "markitdown", "summary": "WAV/MP3/M4A/MP4 → Markdown via speech_recognition (Google Web Speech API) + exiftool metadata. Duration excluded (wrong from memory stream). Temp file needed for non-WAV formats.", "study": "features/media-processing/study/audio-transcription--from-markitdown.md", "build": "features/media-processing/build/audio-transcription--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "web-extraction/youtube-extraction--from-markitdown", "label": "YouTube Extraction", "domain": "web-extraction", "repo": "markitdown", "summary": "YouTube watch URL → Markdown. Meta tag scrape for views/keywords/duration. Recursive ytInitialData JSON search for description. youtube_transcript_api with 3-retry logic for transcript.", "study": "features/web-extraction/study/youtube-extraction--from-markitdown.md", "build": "features/web-extraction/build/youtube-extraction--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "web-extraction/html-web-conversion--from-markitdown", "label": "HTML Web Conversion", "domain": "web-extraction", "repo": "markitdown", "summary": "BeautifulSoup + custom markdownify subclass. Strips scripts/styles, extracts body, RecursionError fallback to plaintext. convert_string() helper used by DOCX/PPTX/XLSX for table rendering. Wikipedia/RSS/Bing specializations.", "study": "features/web-extraction/study/html-web-conversion--from-markitdown.md", "build": "features/web-extraction/build/html-web-conversion--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "ai-integration/azure-doc-intelligence--from-markitdown", "label": "Azure Doc Intelligence", "domain": "ai-integration", "repo": "markitdown", "summary": "Azure prebuilt-layout model for OCR-grade extraction of PDFs, images, Office files. Submits bytes, gets native Markdown back, strips HTML comments. OCR features (high-res, formulas, fonts) enabled only for PDF/image types.", "study": "features/ai-integration/study/azure-doc-intelligence--from-markitdown.md", "build": "features/ai-integration/build/azure-doc-intelligence--from-markitdown.md", "source": "https://github.com/microsoft/markitdown", "notebooklm": ""}, {"id": "agent-architecture/agent-output-contract--from-last30days-skill", "label": "Agent Output Contract", "domain": "agent-architecture", "repo": "last30days-skill", "summary": "5-law output contract enforced via SKILL.md prompt text: no Sources block, no invented headers, space-dash-space separators, no ## inside body sections, verbatim footer passthrough. Zero runtime validation.", "study": "features/agent-architecture/study/agent-output-contract--from-last30days-skill.md", "build": "features/agent-architecture/build/agent-output-contract--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "research-automation/multi-source-research-engine--from-last30days-skill", "label": "Multi-Source Research Engine", "domain": "research-automation", "repo": "last30days-skill", "summary": "ThreadPoolExecutor fan-out to 6–20 sources. Depth tiers (quick/default/deep) cap source count. 2-phase retrieval with 5xx retry. Unified Report schema. Five emit formats (compact/json/context/md/html).", "study": "features/research-automation/study/multi-source-research-engine--from-last30days-skill.md", "build": "features/research-automation/build/multi-source-research-engine--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "research-automation/entity-resolution--from-last30days-skill", "label": "Entity Resolution", "domain": "research-automation", "repo": "last30days-skill", "summary": "4 parallel searches resolve topic → {subreddits, handles, repos, context}. X handles get 3× URL weight. GitHub -action canonicalization. News context capped at 300 chars for LLM injection.", "study": "features/research-automation/study/entity-resolution--from-last30days-skill.md", "build": "features/research-automation/build/entity-resolution--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "research-automation/engagement-signal-ranking--from-last30days-skill", "label": "Engagement Signal Ranking", "domain": "research-automation", "repo": "last30days-skill", "summary": "Two-stage: RRF (k=60, topic-sensitive source_weights) then LLM rerank of top-N. Quality nudge detects degraded sources via domain diversity + snippet density. All inputs from pipeline Report.", "study": "features/research-automation/study/engagement-signal-ranking--from-last30days-skill.md", "build": "features/research-automation/build/engagement-signal-ranking--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "content-synthesis/cross-source-clustering--from-last30days-skill", "label": "Cross-Source Clustering", "domain": "content-synthesis", "repo": "last30days-skill", "summary": "Two-pass clustering: Pass 1 greedy text similarity (0.42/0.48 thresholds), Pass 2 entity overlap on small clusters. MMR picks up to 3 reps per cluster. Polymarket isolation, same-source enforcement.", "study": "features/content-synthesis/study/cross-source-clustering--from-last30days-skill.md", "build": "features/content-synthesis/build/cross-source-clustering--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "credential-management/multi-tier-credentials--from-last30days-skill", "label": "Multi-Tier Credentials", "domain": "credential-management", "repo": "last30days-skill", "summary": "Tier 1 keyless (Reddit/HN/Polymarket/GitHub), Tier 2 browser cookies (X via Bird/Chrome/Safari/xurl, YouTube via yt-dlp/SSH), Tier 3 API keys (.env dual hierarchy, perms 600). Preflight startup checks.", "study": "features/credential-management/study/multi-tier-credentials--from-last30days-skill.md", "build": "features/credential-management/build/multi-tier-credentials--from-last30days-skill.md", "source": "https://github.com/mvanhorn/last30days-skill", "notebooklm": ""}, {"id": "structured-extraction/schema-driven-extraction--from-llm-scraper", "label": "Schema-Driven Extraction", "domain": "structured-extraction", "repo": "llm-scraper", "summary": "Playwright page + Zod/JSON schema → typed object. Preprocess page, then AI SDK generateText with schema as `output` constraint, read result.output. Schema is both TS type and runtime constraint. One method: run(). No retry loop.", "study": "features/structured-extraction/study/schema-driven-extraction--from-llm-scraper.md", "build": "features/structured-extraction/build/schema-driven-extraction--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "structured-extraction/streaming-partial-objects--from-llm-scraper", "label": "Streaming Partial Objects", "domain": "structured-extraction", "repo": "llm-scraper", "summary": "stream() variant: AI SDK streamText with schema output → partialOutputStream async iterable. Each emission is a schema-conformant partial; last is complete. Mirror of run() but returns {stream,url}. For responsive UIs.", "study": "features/structured-extraction/study/streaming-partial-objects--from-llm-scraper.md", "build": "features/structured-extraction/build/streaming-partial-objects--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "content-preprocessing/page-format-pipeline--from-llm-scraper", "label": "Page Format Pipeline", "domain": "content-preprocessing", "repo": "llm-scraper", "summary": "preprocess(page,options) → {url,content,format}. Six formats: raw_html, markdown (Turndown), text (Mozilla Readability via CDN in-page), html (cleanup scrub, default), image (base64 screenshot), custom. Cost/fidelity dial.", "study": "features/content-preprocessing/study/page-format-pipeline--from-llm-scraper.md", "build": "features/content-preprocessing/build/page-format-pipeline--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "content-preprocessing/html-cleanup--from-llm-scraper", "label": "HTML Cleanup", "domain": "content-preprocessing", "repo": "llm-scraper", "summary": "In-browser DOM scrub via page.evaluate. Removes ~30 tag types (script/style/media/form/nav/head) and prefix-strips noise attributes (style/src/on*/aria-/data-). Mutates live DOM. href kept. Token-diet for the default html format.", "study": "features/content-preprocessing/study/html-cleanup--from-llm-scraper.md", "build": "features/content-preprocessing/build/html-cleanup--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "code-generation/scraper-code-generation--from-llm-scraper", "label": "Scraper Code Generation", "domain": "code-generation", "repo": "llm-scraper", "summary": "generate() asks LLM to write a self-contained IIFE JS scraper for page+schema instead of extracting. Plain generateText (schema as context, not constraint). stripMarkdownBackticks cleans fences. Amortizes AI cost across runs.", "study": "features/code-generation/study/scraper-code-generation--from-llm-scraper.md", "build": "features/code-generation/build/scraper-code-generation--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "ai-integration/provider-agnostic-llm--from-llm-scraper", "label": "Provider-Agnostic LLM Layer", "domain": "ai-integration", "repo": "llm-scraper", "summary": "Multi-provider (OpenAI/Anthropic/Google/Groq/Ollama) with zero per-provider code by depending on the Vercel AI SDK LanguageModel abstraction. Constructor takes one model handle; provider chosen by caller. Lesson: abstract one level above the vendor.", "study": "features/ai-integration/study/provider-agnostic-llm--from-llm-scraper.md", "build": "features/ai-integration/build/provider-agnostic-llm--from-llm-scraper.md", "source": "https://github.com/mishushakov/llm-scraper", "notebooklm": ""}, {"id": "ai-automation/ai-rules-engine--from-inbox-zero", "label": "AI Rules Engine", "domain": "ai-automation", "repo": "inbox-zero", "summary": "Plain-English inbox automation. Cost funnel: static/pattern matching first (address-anchored, AND/OR), LLM rule-selection only for the ambiguous remainder (Zod schema + 'no match' flag), second LLM call fills {{template}} action args, deterministic executor runs actions + writes ExecutedRule/ExecutedAction audit trail. Dry-run mode skips all writes.", "study": "features/ai-automation/study/ai-rules-engine--from-inbox-zero.md", "build": "features/ai-automation/build/ai-rules-engine--from-inbox-zero.md", "source": "https://github.com/elie222/inbox-zero", "notebooklm": ""}, {"id": "ai-automation/ai-reply-drafting--from-inbox-zero", "label": "AI Reply Drafting", "domain": "ai-automation", "repo": "inbox-zero", "summary": "Tone-matched reply drafts + confidence (LOW/MED/HIGH). Assembles thread (per-msg ~3000 char cap), profile, knowledge, calendar slots, past drafts. Writing-style priority: explicit > learned > default. Learned style is a distilled PII-free summary (<=1500 chars) of the user's edits. Output normalizer + repetition guard.", "study": "features/ai-automation/study/ai-reply-drafting--from-inbox-zero.md", "build": "features/ai-automation/build/ai-reply-drafting--from-inbox-zero.md", "source": "https://github.com/elie222/inbox-zero", "notebooklm": ""}, {"id": "inbox-cleanup/bulk-unsubscriber--from-inbox-zero", "label": "Bulk Unsubscriber", "domain": "inbox-cleanup", "repo": "inbox-zero", "summary": "Real server-side one-click unsubscribe. Parses RFC 2369 List-Unsubscribe (extracts https URL), RFC 8058 one-click POST (body 'List-Unsubscribe=One-Click') with GET fallback, SSRF-guarded fetch, <=5 redirects with 301/302/303->GET downgrade. Persists per-sender Newsletter status (APPROVED/UNSUBSCRIBED/AUTO_ARCHIVED).", "study": "features/inbox-cleanup/study/bulk-unsubscriber--from-inbox-zero.md", "build": "features/inbox-cleanup/build/bulk-unsubscriber--from-inbox-zero.md", "source": "https://github.com/elie222/inbox-zero", "notebooklm": ""}, {"id": "inbox-cleanup/bulk-archiver--from-inbox-zero", "label": "Bulk Archiver", "domain": "inbox-cleanup", "repo": "inbox-zero", "summary": "Risk-tiered archive triage. Pure function scoring senders by category-name substring: HIGH (marketing/promotion/newsletter/sale), MEDIUM (notification/alert/receipt/update), LOW (other). Returns {confidence, reason} candidates. Only HIGH is one-click — tiering is the safety mechanism. Scoring decoupled from execution.", "study": "features/inbox-cleanup/study/bulk-archiver--from-inbox-zero.md", "build": "features/inbox-cleanup/build/bulk-archiver--from-inbox-zero.md", "source": "https://github.com/elie222/inbox-zero", "notebooklm": ""}, {"id": "email-platform/email-provider-abstraction--from-inbox-zero", "label": "Email Provider Abstraction", "domain": "email-platform", "repo": "inbox-zero", "summary": "Adapter+factory seam over Gmail + Outlook/Graph. One EmailProvider interface, GmailProvider/OutlookProvider adapters normalize to a shared ParsedMessage. createEmailProvider validates provider, fails fast on rate-limit, gets OAuth client (token refresh hidden in client getters). Label vs folder absorbed by adapters.", "study": "features/email-platform/study/email-provider-abstraction--from-inbox-zero.md", "build": "features/email-platform/build/email-provider-abstraction--from-inbox-zero.md", "source": "https://github.com/elie222/inbox-zero", "notebooklm": ""}, {"id": "agent-architecture/ordered-backend-routing--from-agent-reach", "label": "Ordered Backend Routing", "domain": "agent-architecture", "repo": "agent-reach", "summary": "Each capability is a Channel with an ORDERED backends list (preferred→fallbacks). Two-phase check: collect all candidates, first `ok` wins, then first `warn` — so an installed-but-logged-out backend can't mask a working fallback. active_backend records the live one. User pin via <name>_backend (unknown value ignored). Switching backend = reorder a list, not code.", "study": "features/agent-architecture/study/ordered-backend-routing--from-agent-reach.md", "build": "features/agent-architecture/build/ordered-backend-routing--from-agent-reach.md", "source": "https://github.com/Panniantong/Agent-Reach", "notebooklm": ""}, {"id": "diagnostics/channel-health-diagnostics--from-agent-reach", "label": "Channel Health Diagnostics", "domain": "diagnostics", "repo": "agent-reach", "summary": "probe_command EXECUTES a side-effect-free command to classify missing/broken(stale venv shebang, exit 126/127)/timeout/ok — which() existence is not health. doctor aggregates per-channel (exceptions degrade to error, stale active_backend cleared), groups by tier, annotates the active backend only when >1 exists, and audits config.yaml permissions (chmod 600). Retries only transient failures.", "study": "features/diagnostics/study/channel-health-diagnostics--from-agent-reach.md", "build": "features/diagnostics/build/channel-health-diagnostics--from-agent-reach.md", "source": "https://github.com/Panniantong/Agent-Reach", "notebooklm": ""}, {"id": "credential-management/cookie-credential-extraction--from-agent-reach", "label": "Cookie Credential Extraction", "domain": "credential-management", "repo": "agent-reach", "summary": "Multi-browser cookie harvest (rookiepy→browser_cookie3) driven by declarative per-platform specs (named cookies vs whole Cookie-header). Validate-before-save: require a logged-in marker (auth_token+ct0, xq_a_token) — presence≠valid. Atomic 0o600 write (O_CREAT+mode, no write-then-chmod race). shlex-quoted best-effort mirrors into upstream tools' credential files.", "study": "features/credential-management/study/cookie-credential-extraction--from-agent-reach.md", "build": "features/credential-management/build/cookie-credential-extraction--from-agent-reach.md", "source": "https://github.com/Panniantong/Agent-Reach", "notebooklm": ""}, {"id": "agent-distribution/agent-driven-install--from-agent-reach", "label": "Agent-Driven Install", "domain": "agent-distribution", "repo": "agent-reach", "summary": "The installer is a markdown runbook an LLM agent executes: thin 'For Humans' one-line trigger over an imperative 'For AI Agents' program. Hard boundaries (no sudo, confined to ~/.agent-reach/, never pollute the workspace), env-branched steps (PEP 668 / Homebrew / Windows Store-alias), explicit user checkpoints, 'selector/router, never a wrapper'. install.md / update.md / daily watch = one lifecycle mechanism.", "study": "features/agent-distribution/study/agent-driven-install--from-agent-reach.md", "build": "features/agent-distribution/build/agent-driven-install--from-agent-reach.md", "source": "https://github.com/Panniantong/Agent-Reach", "notebooklm": ""}, {"id": "tts/onnx-tts-pipeline--from-supertonic", "label": "ONNX TTS Pipeline", "domain": "tts", "repo": "supertonic", "summary": "On-device TTS as four chained ONNX models: duration_predictor -> text_encoder -> vector_estimator (flow-matching, looped) -> vocoder. Unicode-code-point tokenizer covers 31 languages; voice is a small style JSON; outputs 44.1kHz WAV, no GPU.", "study": "features/tts/study/onnx-tts-pipeline--from-supertonic.md", "build": "features/tts/build/onnx-tts-pipeline--from-supertonic.md", "source": "https://github.com/supertone-inc/supertonic", "notebooklm": ""}, {"id": "tts/flow-matching-sampler--from-supertonic", "label": "Flow-Matching Sampler", "domain": "tts", "repo": "supertonic", "summary": "Generative core: iteratively denoise a gaussian latent into a speech latent via vector_estimator.onnx, called total_steps times (5-12, default 8). current_step/total_step are tensor inputs, giving a runtime quality/latency dial without retraining. Length-Aware RoPE keeps text<->speech aligned.", "study": "features/tts/study/flow-matching-sampler--from-supertonic.md", "build": "features/tts/build/flow-matching-sampler--from-supertonic.md", "source": "https://github.com/supertone-inc/supertonic", "notebooklm": ""}, {"id": "tts/expression-tags--from-supertonic", "label": "Expression Tags", "domain": "tts", "repo": "supertonic", "summary": "Inline prosody control via ~10 closed-vocabulary text tags (<laugh>, <breath>, <sigh>). Recognized in the text front-end and mapped to reserved token ids, so they flow through every stage as ordinary tokens and the trained models render them as acoustic events. No DSP, no reference audio.", "study": "features/tts/study/expression-tags--from-supertonic.md", "build": "features/tts/build/expression-tags--from-supertonic.md", "source": "https://github.com/supertone-inc/supertonic", "notebooklm": ""}, {"id": "ai-workflow/agentic-loop--from-open-design", "label": "Agentic Loop", "domain": "ai-workflow", "repo": "open-design", "summary": "3-stage linear pipeline (plan→generate→critique) in a single agent conversation thread. Critique Theater: 5-panelist jury (Designer/Critic/Brand/A11Y/Copy) with convergence enforcement. Iteration ceiling via OD_MAX_DEVLOOP_ITERATIONS.", "study": "features/ai-workflow/study/agentic-loop--from-open-design.md", "build": "features/ai-workflow/build/agentic-loop--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "codegen/design-artifact-generation--from-open-design", "label": "Design Artifact Generation", "domain": "codegen", "repo": "open-design", "summary": "4 pathways: HTML prototypes (inline-CSS React, sandboxed iframe), HTML decks (fixed skeleton + SLOT: fills), images (AIHubMix), and MP4 videos (Seedance/Wan/Veo/Sora). Async polling for long video renders.", "study": "features/codegen/study/design-artifact-generation--from-open-design.md", "build": "features/codegen/build/design-artifact-generation--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "design-systems/design-systems-library--from-open-design", "label": "Design Systems Library", "domain": "design-systems", "repo": "open-design", "summary": "150 DESIGN.md files with fixed 9-section schema (Visual Theme, Colors, Typography, Components, Layout, Elevation, Dos/Donts, Responsive, Agent Guide). Zero-config directory scan. Skills can filter to specific sections to reduce context bloat.", "study": "features/design-systems/study/design-systems-library--from-open-design.md", "build": "features/design-systems/build/design-systems-library--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "plugin-architecture/skills-system--from-open-design", "label": "Skills System", "domain": "plugin-architecture", "repo": "open-design", "summary": "SKILL.md = minimal YAML frontmatter + markdown instructions. adaptAgentSkill() converts to PluginManifest via 3-layer merge (sidecar>adapter>fallback). SHA-256 digest for reproducibility. Pure-TS runtime (no Node imports) runs in daemon/browser/CI.", "study": "features/plugin-architecture/study/skills-system--from-open-design.md", "build": "features/plugin-architecture/build/skills-system--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "plugin-architecture/plugin-ecosystem--from-open-design", "label": "Plugin Ecosystem", "domain": "plugin-architecture", "repo": "open-design", "summary": "3-tier discovery: official (bundled), community (registry), user custom (local drop-in). 22+ agent CLI adapters (one object: bin/versionArgs/buildArgs/streamFormat). Agent execution via stdio child processes. Sidecar open-design.json for highest-priority overrides.", "study": "features/plugin-architecture/study/plugin-ecosystem--from-open-design.md", "build": "features/plugin-architecture/build/plugin-ecosystem--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "ai-workflow/agent-cli-integration--from-open-design", "label": "Agent CLI Integration", "domain": "ai-workflow", "repo": "open-design", "summary": "Dual-mode od CLI: default starts daemon+UI, subcommands are thin HTTP clients. PATH scan detects 22+ agent CLIs. Agents run as child processes, stdout relayed via SSE. Recoverable exit codes 64-75. MCP OAuth daemon-hosted.", "study": "features/ai-workflow/study/agent-cli-integration--from-open-design.md", "build": "features/ai-workflow/build/agent-cli-integration--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "infrastructure/byok-proxy--from-open-design", "label": "BYOK Proxy", "domain": "infrastructure", "repo": "open-design", "summary": "POST /api/proxy/{anthropic,openai,azure,google,ollama,senseaudio}/stream. API key in request body. SSE response: start/delta/error/end events. SSRF protection blocks RFC1918, link-local, CGNAT. Azure needs apiVersion field.", "study": "features/infrastructure/study/byok-proxy--from-open-design.md", "build": "features/infrastructure/build/byok-proxy--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "infrastructure/local-first-architecture--from-open-design", "label": "Local-First Architecture", "domain": "infrastructure", "repo": "open-design", "summary": "3-process: Electron main + Node.js Hono daemon + Next.js web UI. SQLite via better-sqlite3 (synchronous). Project files in ~/.od/projects/<id>/. Sidecar IPC: STATUS/EVAL/SCREENSHOT/CONSOLE/CLICK/SHUTDOWN. Optional S3 backend + Docker deployment.", "study": "features/infrastructure/study/local-first-architecture--from-open-design.md", "build": "features/infrastructure/build/local-first-architecture--from-open-design.md", "source": "https://github.com/nexu-io/open-design", "notebooklm": ""}, {"id": "canvas-interaction/pan-zoom-canvas--from-xyflow", "label": "Pan & Zoom Canvas", "domain": "canvas-interaction", "repo": "xyflow", "summary": "Infinite pannable/zoomable viewport wrapping d3-zoom. Single [x,y,zoom] transform; factory exposes setViewport/scaleTo/syncViewport; a per-render filter encodes all product rules (pan-on-drag, activation keys, no-pan zones, pan-on-scroll).", "study": "features/canvas-interaction/study/pan-zoom-canvas--from-xyflow.md", "build": "features/canvas-interaction/build/pan-zoom-canvas--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "canvas-interaction/node-dragging--from-xyflow", "label": "Node Dragging", "domain": "canvas-interaction", "repo": "xyflow", "summary": "d3-drag node movement: multi-select moves as rigid group, group-snaps as a unit, screen-space drag threshold, extent clamp, and rAF edge auto-pan that re-derives position from a stored last pointer.", "study": "features/canvas-interaction/study/node-dragging--from-xyflow.md", "build": "features/canvas-interaction/build/node-dragging--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "canvas-interaction/minimap-navigation--from-xyflow", "label": "Minimap Navigation", "domain": "canvas-interaction", "repo": "xyflow", "summary": "Overview panel that is a remote control for the main viewport (not a 2nd viewport). d3-zoom on the mini SVG as a gesture recognizer; deltas scaled by minimap-shrink x main-zoom feed setViewportConstrained/scaleTo.", "study": "features/canvas-interaction/study/minimap-navigation--from-xyflow.md", "build": "features/canvas-interaction/build/minimap-navigation--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "graph-editing/connection-handles--from-xyflow", "label": "Connection Handles", "domain": "graph-editing", "repo": "xyflow", "summary": "Drag-to-connect with no d3: raw pointer listeners on document/shadow-host. Closest-handle within radius BUT DOM elementFromPoint wins; strict/loose validity + self-loop block + custom predicate; onConnect on valid drop.", "study": "features/graph-editing/study/connection-handles--from-xyflow.md", "build": "features/graph-editing/build/connection-handles--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "graph-editing/node-resizer--from-xyflow", "label": "Node Resizer", "domain": "graph-editing", "repo": "xyflow", "summary": "d3-drag on 8 control points. Corner-anchoring (top/left handles move x/y to pin the opposite edge), aspect captured at start, min/max + parent/child extents, children shifted inverse to origin move, emits only on real change.", "study": "features/graph-editing/study/node-resizer--from-xyflow.md", "build": "features/graph-editing/build/node-resizer--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "graph-rendering/edge-path-algorithms--from-xyflow", "label": "Edge Path Algorithms", "domain": "graph-rendering", "repo": "xyflow", "summary": "Pure dependency-free SVG path fns: getBezierPath (curvature*25*sqrt(-d) loop trick, t=0.5 label weights), getSmoothStepPath (orthogonal route, corner radius clamped to half-segment), getStraightPath. Returns [path,labelX,labelY,offsetX,offsetY].", "study": "features/graph-rendering/study/edge-path-algorithms--from-xyflow.md", "build": "features/graph-rendering/build/edge-path-algorithms--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "state-management/reactive-store--from-xyflow", "label": "Reactive Store Architecture", "domain": "state-management", "repo": "xyflow", "summary": "Zustand store + selector/equality subscriptions for surgical re-renders; array<->Map duality (user nodes[] vs derived nodeLookup of enriched internal nodes); framework-free @xyflow/system core with thin React/Svelte adapters.", "study": "features/state-management/study/reactive-store--from-xyflow.md", "build": "features/state-management/build/reactive-store--from-xyflow.md", "source": "https://github.com/xyflow/xyflow", "notebooklm": ""}, {"id": "design-systems/token-pipeline-orchestration--from-style-dictionary", "label": "Token Pipeline Orchestration", "domain": "design-systems", "repo": "style-dictionary", "summary": "End-to-end build engine: load+deep-merge tokens, keep 3 synced representations, then per-platform transform↔resolve convergence loop → filter → format → write. structuredClone-isolated platforms run concurrently; abstracted FS runs in browser or Node.", "study": "features/design-systems/study/token-pipeline-orchestration--from-style-dictionary.md", "build": "features/design-systems/build/token-pipeline-orchestration--from-style-dictionary.md", "source": "https://github.com/style-dictionary/style-dictionary", "notebooklm": ""}, {"id": "design-systems/reference-resolution-engine--from-style-dictionary", "label": "Reference Resolution Engine", "domain": "design-systems", "repo": "style-dictionary", "summary": "Resolves {token.path} aliases across the token graph: regex {([^}]+)}, dot-separated paths, transitive chains, multi-ref strings, object refs, number-type preservation, stack-based cycle detection, and conditional outputReferences (keep refs only when safe).", "study": "features/design-systems/study/reference-resolution-engine--from-style-dictionary.md", "build": "features/design-systems/build/reference-resolution-engine--from-style-dictionary.md", "source": "https://github.com/style-dictionary/style-dictionary", "notebooklm": ""}, {"id": "design-systems/transforms-and-transform-groups--from-style-dictionary", "label": "Transforms & Transform Groups", "domain": "design-systems", "repo": "style-dictionary", "summary": "Composable name/value/attribute transforms with optional filter; CTI (category/type/item) attribute convention; ordered per-platform groups (css/scss/js/ios/android/flutter/...); `transitive` flag runs value transforms after ref resolution; undefined return = defer.", "study": "features/design-systems/study/transforms-and-transform-groups--from-style-dictionary.md", "build": "features/design-systems/build/transforms-and-transform-groups--from-style-dictionary.md", "source": "https://github.com/style-dictionary/style-dictionary", "notebooklm": ""}, {"id": "plugin-architecture/register-extensibility-api--from-style-dictionary", "label": "Register / Extensibility API", "domain": "plugin-architecture", "repo": "style-dictionary", "summary": "Eight-bucket in-process hook registry (transforms, transformGroups, formats, filters, actions, parsers, preprocessors, fileHeaders). Static (class-level) vs instance (_hooks) scopes deepmerged on read; per-type validation; string-name indirection from config to plugin; silent overwrite on collision.", "study": "features/plugin-architecture/study/register-extensibility-api--from-style-dictionary.md", "build": "features/plugin-architecture/build/register-extensibility-api--from-style-dictionary.md", "source": "https://github.com/style-dictionary/style-dictionary", "notebooklm": ""}, {"id": "rendering/hand-drawn-rendering--from-excalidraw", "label": "Hand-Drawn Rendering", "domain": "rendering", "repo": "excalidraw", "summary": "Rough.js sketchy shapes with a FROZEN per-element seed fed into Rough every render so the wobble is deterministic (no shimmer on move/zoom/reload). Size-aware roughness, hand-built SVG-path rounded corners, disableMultiStroke for dashed, WeakMap shape cache keyed on versionNonce. Freedraw via perfect-freehand.", "study": "features/rendering/study/hand-drawn-rendering--from-excalidraw.md", "build": "features/rendering/build/hand-drawn-rendering--from-excalidraw.md", "source": "https://github.com/excalidraw/excalidraw", "notebooklm": ""}, {"id": "realtime-collab/e2e-encrypted-collaboration--from-excalidraw", "label": "E2E-Encrypted Collaboration", "domain": "realtime-collab", "repo": "excalidraw", "summary": "Zero-knowledge collab: AES-GCM 128 room key lives in the URL fragment (#room=ID,KEY) so the server never sees it; fresh 12-byte IV per message. socket.io relay only routes ciphertext. Delta broadcast via version Map + periodic full resync; reliable edits vs volatile presence. Encrypted Firebase persistence {sceneVersion,iv,ciphertext}, debounced, transactional reconcile on save.", "study": "features/realtime-collab/study/e2e-encrypted-collaboration--from-excalidraw.md", "build": "features/realtime-collab/build/e2e-encrypted-collaboration--from-excalidraw.md", "source": "https://github.com/excalidraw/excalidraw", "notebooklm": ""}, {"id": "realtime-collab/scene-reconciliation--from-excalidraw", "label": "Scene Reconciliation", "domain": "realtime-collab", "repo": "excalidraw", "summary": "CRDT-free deterministic merge of local+remote element lists. Per-element last-write-wins: version is the logical clock, versionNonce the tiebreaker (lowest wins on equal version, using <= for a total relation). Active-editing (editing/resizing/new) guards override version math. Sorts + repairs fractional z-index last. Same fn runs client-side and inside the Firebase save transaction.", "study": "features/realtime-collab/study/scene-reconciliation--from-excalidraw.md", "build": "features/realtime-collab/build/scene-reconciliation--from-excalidraw.md", "source": "https://github.com/excalidraw/excalidraw", "notebooklm": ""}, {"id": "data-structures/fractional-indexing--from-excalidraw", "label": "Fractional Indexing (z-order)", "domain": "data-structures", "repo": "excalidraw", "summary": "String order keys (base-62) where any two have a key between them, so insert/move/reorder mutates ONLY the moved element. orderByFractionalIndex sorts by string compare (id tiebreak). Invariant predecessor<current<successor with detect (validateFractionalIndices) + repair of contiguous broken runs (syncInvalidIndices). JITTERED fork of generateNKeysBetween so concurrent same-gap inserts don't collide.", "study": "features/data-structures/study/fractional-indexing--from-excalidraw.md", "build": "features/data-structures/build/fractional-indexing--from-excalidraw.md", "source": "https://github.com/excalidraw/excalidraw", "notebooklm": ""}, {"id": "reactivity/signals-reactivity-engine--from-tldraw", "label": "Signals Reactivity Engine", "domain": "reactivity", "repo": "tldraw", "summary": "Fine-grained reactivity (atom/computed/react) coordinated by a single global epoch counter. Dependencies auto-discovered by observing reads; staleness decided by epoch comparison, not value diffing. Signals carry diff-history so consumers can ask 'what changed since epoch N?'. Zero deps.", "study": "features/reactivity/study/signals-reactivity-engine--from-tldraw.md", "build": "features/reactivity/build/signals-reactivity-engine--from-tldraw.md", "source": "https://github.com/tldraw/tldraw", "notebooklm": ""}, {"id": "state-management/reactive-record-store--from-tldraw", "label": "Reactive Record Store", "domain": "state-management", "repo": "tldraw", "summary": "In-memory normalized record DB on signals. Flat 'type:id' records with scope (document/session/presence); reactive queries with incrementally-maintained indexes; every write emits a RecordsDiff {added,updated,removed} tagged source user|remote. Snapshots + migration on load.", "study": "features/state-management/study/reactive-record-store--from-tldraw.md", "build": "features/state-management/build/reactive-record-store--from-tldraw.md", "source": "https://github.com/tldraw/tldraw", "notebooklm": ""}, {"id": "schema-migrations/schema-migrations--from-tldraw", "label": "Schema & Migrations", "domain": "schema-migrations", "repo": "tldraw", "summary": "Versioned bidirectional migrations. Namespaced ids (sequenceId/version) grouped into sequences with record/store/storage scope; cross-sequence dependsOn resolved by topological sort. Compact SerializedSchema travels with snapshots + connect handshake; up to upgrade, down to serve older peers.", "study": "features/schema-migrations/study/schema-migrations--from-tldraw.md", "build": "features/schema-migrations/build/schema-migrations--from-tldraw.md", "source": "https://github.com/tldraw/tldraw", "notebooklm": ""}, {"id": "realtime/multiplayer-sync--from-tldraw", "label": "Multiplayer Sync", "domain": "realtime", "repo": "tldraw", "summary": "Server-authoritative optimistic-rebase sync over WebSockets. Clients edit locally, stash speculative changes, push NetworkDiffs with a clientClock; server applies, assigns serverClock, returns commit/discard/rebase and broadcasts patches. Clients rebase (rewind→apply→replay). Presence synced-not-persisted; tombstone catch-up; per-session schema migration. Reference server = Cloudflare Durable Object.", "study": "features/realtime/study/multiplayer-sync--from-tldraw.md", "build": "features/realtime/build/multiplayer-sync--from-tldraw.md", "source": "https://github.com/tldraw/tldraw", "notebooklm": ""}, {"id": "agent-guardrails/deterministic-security-hooks--from-pagokit", "label": "Deterministic Security Hooks", "domain": "agent-guardrails", "repo": "pagokit", "summary": "Enforce rules on an AI agent's output via Claude Code hooks: PreToolUse/PostToolUse/Stop on Write|Edit|MultiEdit -> one dispatcher -> pluggable run(ctx)->finding|null checks. Exit 2 blocks the write; fail-open on crashes/timeouts. Comment/string stripping + test allowlist + pagokit-ignore bypass + audit log. Domain-agnostic guardrail engine.", "study": "features/agent-guardrails/study/deterministic-security-hooks--from-pagokit.md", "build": "features/agent-guardrails/build/deterministic-security-hooks--from-pagokit.md", "source": "https://github.com/Hainrixz/agente-pagokit", "notebooklm": ""}, {"id": "payments/payment-provider-advisor--from-pagokit", "label": "Payment Provider Advisor", "domain": "payments", "repo": "pagokit", "summary": "Data-driven gateway selection: providers.json catalog with context-keyed score_modifiers. ≤5 questions -> hard filters (region/currency/methods/capability/KYC eliminate) -> score = base 5 + matching modifiers -> top pick. Recommendation gives reasons, real fee calc, KYC timeline, anti-patterns, 'verified on <date>'; never shows the score. Adding a provider = adding a JSON row.", "study": "features/payments/study/payment-provider-advisor--from-pagokit.md", "build": "features/payments/build/payment-provider-advisor--from-pagokit.md", "source": "https://github.com/Hainrixz/agente-pagokit", "notebooklm": ""}, {"id": "payments/secure-payment-webhook--from-pagokit", "label": "Secure Payment Webhook & Idempotency", "domain": "payments", "repo": "pagokit", "summary": "Correct payment integration shape: checkout with crypto.randomUUID() idempotency key; webhook in strict order raw body -> verify signature -> reject stale timestamp (replay, ~300s) -> dedup by event id -> act -> 200. Parse-before-verify is the core bug. Per-provider scheme read from data. 5 tables incl. webhook_events_processed. Enforced by the deterministic hooks.", "study": "features/payments/study/secure-payment-webhook--from-pagokit.md", "build": "features/payments/build/secure-payment-webhook--from-pagokit.md", "source": "https://github.com/Hainrixz/agente-pagokit", "notebooklm": ""}, {"id": "code-generation/interview-driven-scaffolding--from-whatsapp-agentkit", "label": "Interview-Driven App Scaffolding", "domain": "code-generation", "repo": "whatsapp-agentkit", "summary": "The product IS a prompt: CLAUDE.md + a /build-agent slash command drive a 5-phase, phase-gated flow (verify env, 10-question interview, generate the full app from inline templates parameterized by answers, local test, deploy). Generates only the chosen variant. No code ships; the app materializes when the LLM runs the recipe.", "study": "features/code-generation/study/interview-driven-scaffolding--from-whatsapp-agentkit.md", "build": "features/code-generation/build/interview-driven-scaffolding--from-whatsapp-agentkit.md", "source": "https://github.com/Hainrixz/whatsapp-agentkit", "notebooklm": ""}, {"id": "messaging/whatsapp-provider-adapter--from-whatsapp-agentkit", "label": "WhatsApp Provider Adapter Layer", "domain": "messaging", "repo": "whatsapp-agentkit", "summary": "Adapter/strategy pattern for a messaging channel: abstract ProveedorWhatsApp + env-driven factory + Meta/Twilio adapters normalizing webhooks into a common MensajeEntrante. Core code never branches on provider; base carries a no-op validar_webhook only Meta overrides; lazy-imports the chosen adapter.", "study": "features/messaging/study/whatsapp-provider-adapter--from-whatsapp-agentkit.md", "build": "features/messaging/build/whatsapp-provider-adapter--from-whatsapp-agentkit.md", "source": "https://github.com/Hainrixz/whatsapp-agentkit", "notebooklm": ""}, {"id": "agent-architecture/conversation-memory--from-whatsapp-agentkit", "label": "Per-Contact Conversation Memory", "domain": "agent-architecture", "repo": "whatsapp-agentkit", "summary": "Minimal async chat memory: one SQLAlchemy table keyed+indexed on phone number, stores user/assistant turns, reads last-N newest-first then reverses to chronological, returns LLM-shaped {role,content} dicts. SQLite local / Postgres prod via one env var (auto-rewrites to asyncpg). Window cap is the only cost control; fetch-before-save avoids duplicating the current turn.", "study": "features/agent-architecture/study/conversation-memory--from-whatsapp-agentkit.md", "build": "features/agent-architecture/build/conversation-memory--from-whatsapp-agentkit.md", "source": "https://github.com/Hainrixz/whatsapp-agentkit", "notebooklm": ""}, {"id": "lead-scoring/rule-based-lead-scoring--from-auto-crm", "label": "Rule-Based Lead Scoring", "domain": "lead-scoring", "repo": "auto-crm", "summary": "Deterministic 0-100 lead score: temperature base + contact completeness + capped engagement - recency decay + deal-value bonus, clamped; thresholds 70/40 -> hot/warm/cold. Offline, pure, doubles as the AI classifier's fallback.", "study": "features/lead-scoring/study/rule-based-lead-scoring--from-auto-crm.md", "build": "features/lead-scoring/build/rule-based-lead-scoring--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "ai-integration/ai-lead-classification--from-auto-crm", "label": "AI Lead Classification (Claude)", "domain": "ai-integration", "repo": "auto-crm", "summary": "Optional Claude Sonnet lead grader -> strict JSON {temperature, confidence, nextAction, reasoning} in Spanish. Null-client-as-feature-flag, regex {...} JSON extraction, total silent fallback to the rule-based scorer. Same write contract.", "study": "features/ai-integration/study/ai-lead-classification--from-auto-crm.md", "build": "features/ai-integration/build/ai-lead-classification--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "lead-ingestion/webhook-lead-ingestion--from-auto-crm", "label": "Webhook Lead Ingestion", "domain": "lead-ingestion", "repo": "auto-crm", "summary": "Public POST endpoint mapping multilingual/Typeform field aliases -> contact. Optional x-webhook-secret auth, name required, defaults webhook/cold/0. No dedup, no scoring on ingest (by design); echoes received keys on 400.", "study": "features/lead-ingestion/study/webhook-lead-ingestion--from-auto-crm.md", "build": "features/lead-ingestion/build/webhook-lead-ingestion--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "agent-architecture/mcp-crm-server--from-auto-crm", "label": "MCP CRM Server", "domain": "agent-architecture", "repo": "auto-crm", "summary": "Exposes a local SQLite CRM to Claude as 10 stdio MCP tools (contacts/deals/activities/pipeline/followups/stats) over better-sqlite3 (WAL, FKs). Read-tools pre-aggregate; no auth (stdio local-only); shares the live DB with the web app.", "study": "features/agent-architecture/study/mcp-crm-server--from-auto-crm.md", "build": "features/agent-architecture/build/mcp-crm-server--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "canvas-interaction/kanban-pipeline-dnd--from-auto-crm", "label": "Kanban Pipeline (drag-and-drop)", "domain": "canvas-interaction", "repo": "auto-crm", "summary": "@dnd-kit sales pipeline board. Optimistic update with full-board snapshot rollback: snapshot on drag start, move in onDragOver, PUT /api/pipeline on drop, restore+toast on failure. 8px activation, closestCorners, DragOverlay.", "study": "features/canvas-interaction/study/kanban-pipeline-dnd--from-auto-crm.md", "build": "features/canvas-interaction/build/kanban-pipeline-dnd--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "analytics/crm-dashboard-kpis--from-auto-crm", "label": "CRM Dashboard KPIs & Analytics", "domain": "analytics", "repo": "auto-crm", "summary": "KPI cards (contacts, active deals, pipeline value, conversion) + Recharts breakdowns. One server-side getStats() reused by web UI and MCP crm_get_stats so numbers never drift; won/lost via stage flags not names; shared color tokens.", "study": "features/analytics/study/crm-dashboard-kpis--from-auto-crm.md", "build": "features/analytics/build/crm-dashboard-kpis--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "data-portability/csv-import-export--from-auto-crm", "label": "CSV Import / Export", "domain": "data-portability", "repo": "auto-crm", "summary": "Partial-success JSON bulk import (201/207 + per-row errors, name required) and dual contacts/deals CSV export with correct escaping, UTF-8 BOM for Excel, humanized values, attachment download with dated filename.", "study": "features/data-portability/study/csv-import-export--from-auto-crm.md", "build": "features/data-portability/build/csv-import-export--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "activity-tracking/followup-buckets--from-auto-crm", "label": "Activity Tracking & Follow-up Buckets", "domain": "activity-tracking", "repo": "auto-crm", "summary": "Activities timeline; pending follow-up = scheduledAt set & completedAt null. Buckets incomplete items into overdue/today/upcoming/unscheduled via Unix-seconds day-window math. Backs web board + MCP crm_get_followups; feeds scoring recency.", "study": "features/activity-tracking/study/followup-buckets--from-auto-crm.md", "build": "features/activity-tracking/build/followup-buckets--from-auto-crm.md", "source": "https://github.com/Hainrixz/auto-crm", "notebooklm": ""}, {"id": "agent-distribution/self-customizing-crm--from-auto-crm", "label": "Self-Customizing CRM via Claude Code Commands", "domain": "agent-distribution", "repo": "auto-crm", "summary": "The configuration layer is an AI agent: .claude/commands/*.md runbooks let Claude edit the real Drizzle schema/components to fit the business instead of a settings UI. Structural vs operational commands, guard-railed by CLAUDE.md/AGENTS.md.", "study": "features/agent-distribution/study/self-customizing-crm--from-auto-crm.md", "build": "features/agent-distribution/build/self-custo m-auto-crm", "to": "activity-tracking/followup-buckets--from-auto-crm", "type": "depends-on"}, {"from": "agent-distribution/self-customizing-crm--from-auto-crm", "to": "analytics/crm-dashboard-kpis--from-auto-crm", "type": "depends-on"}, {"from": "ai-integration/ai-lead-classification--from-auto-crm", "to": "ai-integration/provider-agnostic-llm--from-llm-scraper", "type": "alternative-to"}, {"from": "agent-architecture/mcp-crm-server--from-auto-crm", "to": "agent-architecture/agent-output-contract--from-last30days-skill", "type": "same-domain"}, {"from": "agent-architecture/mcp-crm-server--from-auto-crm", "to": "agent-architecture/ordered-backend-routing--from-agent-reach", "type": "same-domain"}, {"from": "canvas-interaction/kanban-pipeline-dnd--from-auto-crm", "to": "canvas-interaction/node-dragging--from-xyflow", "type": "alternative-to"}, {"from": "agent-distribution/self-customizing-crm--from-auto-crm", "to": "agent-distribution/agent-driven-install--from-agent-reach", "type": "similar-pattern"}]};
const DOMAIN_COLORS = {"adaptive-parsing": "#76e4f7", "document-conversion": "#4299e1", "plugin-architecture": "#9f7aea", "file-detection": "#f6ad55", "media-processing": "#68d391", "web-extraction": "#fc8181", "ai-integration": "#f687b3", "agent-architecture": "#f6e05e", "research-automation": "#63b3ed", "content-synthesis": "#b794f4", "credential-management": "#fbb6ce", "structured-extraction": "#4fd1c5", "content-preprocessing": "#ed8936", "code-generation": "#48bb78", "ai-automation": "#ecc94b", "inbox-cleanup": "#0bc5ea", "email-platform": "#a0aec0", "diagnostics": "#f56565", "agent-distribution": "#ed64a6", "canvas-interaction": "#38bdf8", "graph-editing": "#facc15", "graph-rendering": "#34d399", "state-management": "#c084fc", "rendering": "#38b2ac", "realtime-collab": "#7f9cf5", "data-structures": "#f6ad55", "lead-scoring": "#fb7185", "lead-ingestion": "#2dd4bf", "analytics": "#a3e635", "data-portability": "#fcd34d", "activity-tracking": "#818cf8", "messaging": "#22d3ee", "ai-workflow": "#c4b5fd", "codegen": "#86efac", "infrastructure": "#94a3b8", "design-systems": "#f0abfc", "tts": "#fda4af", "realtime": "#7dd3fc", "schema-migrations": "#fbbf24", "reactivity": "#a78bfa", "agent-guardrails": "hsl(325, 65%, 62%)", "payments": "hsl(146, 65%, 62%)"};
const REPO = "derrick-ships/distill-it", BRANCH = "main";
const docURL = p => `https://github.com/${REPO}/blob/${BRANCH}/${p}`;
const colorOf = d => DOMAIN_COLORS[d] || '#aaa';

init(GRAPH_DATA);

function init(data) {
  const nodes = data.nodes.map(n => ({ ...n }));
  const nodeIds = new Set(nodes.map(n => n.id));
  const edges = data.edges
    .filter(e => nodeIds.has(e.from) && nodeIds.has(e.to))
    .map(e => ({ source: e.from, target: e.to, type: e.type }));

  // legend
  const dl = document.getElementById('domain-legend');
  [...new Set(nodes.map(n => n.domain))].sort().forEach(d => {
    const it = document.createElement('div');
    it.className = 'legend-item';
    it.innerHTML = `<div class="legend-dot" style="background:${colorOf(d)}"></div><span>${d}</span>`;
    dl.appendChild(it);
  });
  document.getElementById('stats').textContent = `${nodes.length} nodes · ${edges.length} edges`;
  const lg = document.getElementById('legend');
  document.getElementById('legend-toggle').onclick = () => lg.classList.toggle('collapsed');
  if (window.innerWidth <= 720) lg.classList.add('collapsed');

  // edge counts → node size
  const ec = {}; nodes.forEach(n => ec[n.id] = 0);
  edges.forEach(e => { ec[e.source]++; ec[e.target]++; });
  const radius = d => 8 + Math.sqrt(ec[d.id] || 0) * 3;

  const svgEl = document.getElementById('svg');
  const svg = d3.select(svgEl);
  let width = svgEl.clientWidth, height = svgEl.clientHeight;

  const g = svg.append('g');
  const zoom = d3.zoom().scaleExtent([0.15, 4]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);

  const link = g.append('g').selectAll('line')
    .data(edges).join('line').attr('class', d => `link ${d.type}`);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id).distance(110).strength(0.35))
    .force('charge', d3.forceManyBody().strength(-340))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04))
    .force('collision', d3.forceCollide().radius(d => radius(d) + 18));

  const node = g.append('g').selectAll('g')
    .data(nodes).join('g').attr('class', 'node')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on('click', (e, d) => { e.stopPropagation(); showPanel(d); highlight(d); });

  svg.on('click', () => { clearHighlight(); hidePanel(); });

  node.append('circle').attr('r', radius)
    .attr('fill', d => colorOf(d.domain)).attr('stroke', '#0d1117').attr('stroke-width', 2);
  node.append('text').attr('dy', d => radius(d) + 13)
    .text(d => d.label.length > 28 ? d.label.slice(0, 27) + '…' : d.label);

  sim.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
        .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  function highlight(sel) {
    const keep = new Set([sel.id]);
    edges.forEach(e => { if (e.source.id === sel.id || e.target.id === sel.id) { keep.add(e.source.id); keep.add(e.target.id); } });
    node.classed('dimmed', d => !keep.has(d.id));
    link.classed('dimmed', e => e.source.id !== sel.id && e.target.id !== sel.id);
  }
  function clearHighlight() { node.classed('dimmed', false); link.classed('dimmed', false); }
  window._clearHighlight = clearHighlight;

  // search
  document.getElementById('search').addEventListener('input', function () {
    const q = this.value.toLowerCase().trim();
    if (!q) { clearHighlight(); return; }
    node.classed('dimmed', d =>
      !d.label.toLowerCase().includes(q) && !d.domain.toLowerCase().includes(q) && !d.repo.toLowerCase().includes(q));
    link.classed('dimmed', true);
  });

  // fit-to-view
  function fit(ms = 500) {
    const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
    if (!xs.length) return;
    const minX = Math.min(...xs), maxX = Math.max(...xs);
    const minY = Math.min(...ys), maxY = Math.max(...ys);
    const w = (maxX - minX) || 1, h = (maxY - minY) || 1;
    const pad = 60;
    const k = Math.min(4, Math.max(0.15, Math.min((width - pad * 2) / w, (height - pad * 2) / h)));
    const tx = width / 2 - k * (minX + maxX) / 2;
    const ty = height / 2 - k * (minY + maxY) / 2;
    svg.transition().duration(ms).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(k));
  }
  document.getElementById('fit-btn').onclick = () => fit();
  sim.on('end', () => fit(0));
  setTimeout(() => fit(600), 900);   // auto-fit once layout settles

  // responsive resize
  function onResize() {
    width = svgEl.clientWidth; height = svgEl.clientHeight;
    sim.force('center', d3.forceCenter(width / 2, height / 2))
       .force('x', d3.forceX(width / 2).strength(0.04))
       .force('y', d3.forceY(height / 2).strength(0.04));
    sim.alpha(0.3).restart();
    setTimeout(() => fit(300), 400);
  }
  window.addEventListener('resize', onResize);
  window.addEventListener('orientationchange', onResize);

  document.getElementById('close-panel').onclick = () => { clearHighlight(); hidePanel(); };
}

function showPanel(d) {
  const panel = document.getElementById('panel');
  const c = colorOf(d.domain);
  let b = '';
  if (d.study) b += `<a class="btn" href="${docURL(d.study)}" target="_blank" rel="noopener">📖 Study doc</a>`;
  if (d.build) b += `<a class="btn primary" href="${docURL(d.build)}" target="_blank" rel="noopener">🔧 Build spec</a>`;
  if (d.source) b += `<a class="btn" href="${d.source}" target="_blank" rel="noopener">🔗 Origin repo</a>`;
  if (d.notebooklm) b += `<a class="btn" href="${d.notebooklm}" target="_blank" rel="noopener">🎧 NotebookLM</a>`;
  document.getElementById('panel-content').innerHTML = `
    <h2>${d.label}</h2>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px">
      <span class="domain-badge" style="background:${c}22;color:${c};border:1px solid ${c}44">${d.domain}</span>
      <span class="repo-label">from ${d.repo}</span>
    </div>
    <p class="summary-text" style="margin-top:12px">${d.summary || ''}</p>
    <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">${b}</div>`;
  panel.classList.add('open');
}
function hidePanel() { document.getElementById('panel').classList.remove('open'); }
</script>
