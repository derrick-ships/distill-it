<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>repo-brain — feature graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f1117; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }

  #graph-container { flex: 1; position: relative; }
  svg { width: 100%; height: 100%; }

  #sidebar { width: 320px; min-width: 320px; background: #1a1f2e; border-left: 1px solid #2d3748; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  #sidebar.hidden { display: none; }

  #search-bar { padding: 8px 12px; background: #2d3748; border: 1px solid #4a5568; border-radius: 6px; color: #e2e8f0; font-size: 14px; width: 100%; }
  #search-bar:focus { outline: none; border-color: #667eea; }

  .panel-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #718096; }
  .node-label { font-size: 18px; font-weight: 600; color: #e2e8f0; line-height: 1.3; }
  .node-domain { font-size: 12px; color: #667eea; margin-top: 2px; }
  .node-summary { font-size: 13px; color: #a0aec0; line-height: 1.5; }

  .btn { display: block; padding: 8px 12px; border-radius: 6px; font-size: 13px; text-decoration: none; color: #e2e8f0; background: #2d3748; border: 1px solid #4a5568; cursor: pointer; text-align: center; transition: background 0.15s; }
  .btn:hover { background: #4a5568; }
  .btn-primary { background: #667eea; border-color: #667eea; }
  .btn-primary:hover { background: #5a67d8; }

  .links-section { display: flex; flex-direction: column; gap: 6px; }
  .placeholder { color: #4a5568; font-size: 14px; text-align: center; margin-top: 40px; }

  /* Domain colors */
  .domain-document-conversion { fill: #4299e1; }
  .domain-plugin-architecture  { fill: #9f7aea; }
  .domain-file-detection       { fill: #f6ad55; }
  .domain-media-processing     { fill: #68d391; }
  .domain-web-extraction       { fill: #fc8181; }
  .domain-ai-integration       { fill: #f687b3; }
  .domain-adaptive-parsing     { fill: #76e4f7; }
  .domain-default              { fill: #718096; }

  .node circle { stroke: #1a1f2e; stroke-width: 2px; cursor: pointer; transition: opacity 0.15s; }
  .node circle:hover { opacity: 0.85; }
  .node.dimmed circle { opacity: 0.2; }
  .node text { font-size: 11px; fill: #e2e8f0; pointer-events: none; }

  .link { stroke: #4a5568; stroke-opacity: 0.5; }
  .link.type-depends-on    { stroke: #667eea; }
  .link.type-same-repo     { stroke: #4a5568; }
  .link.type-same-domain   { stroke: #68d391; stroke-dasharray: 4 2; }
  .link.type-alternative-to { stroke: #f6ad55; stroke-dasharray: 6 3; }

  #legend { position: absolute; bottom: 16px; left: 16px; background: rgba(26,31,46,0.9); border: 1px solid #2d3748; border-radius: 8px; padding: 12px 16px; font-size: 12px; }
  .legend-item { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; color: #a0aec0; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 24px; height: 2px; flex-shrink: 0; }
</style>
</head>
<body>

<div id="graph-container">
  <svg id="svg"></svg>
  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4299e1"></div> document-conversion</div>
    <div class="legend-item"><div class="legend-dot" style="background:#9f7aea"></div> plugin-architecture</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f6ad55"></div> file-detection</div>
    <div class="legend-item"><div class="legend-dot" style="background:#68d391"></div> media-processing</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fc8181"></div> web-extraction</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f687b3"></div> ai-integration</div>
    <div class="legend-item"><div class="legend-dot" style="background:#76e4f7"></div> adaptive-parsing</div>
    <hr style="border-color:#2d3748;margin:8px 0">
    <div class="legend-item"><div class="legend-line" style="background:#667eea"></div> depends-on</div>
    <div class="legend-item"><div class="legend-line" style="background:#68d391;background:repeating-linear-gradient(90deg,#68d391 0,#68d391 4px,transparent 4px,transparent 6px)"></div> same-domain</div>
    <div class="legend-item"><div class="legend-line" style="background:#f6ad55;background:repeating-linear-gradient(90deg,#f6ad55 0,#f6ad55 6px,transparent 6px,transparent 9px)"></div> alternative-to</div>
  </div>
</div>

<div id="sidebar">
  <input id="search-bar" type="text" placeholder="Search nodes…">
  <div id="panel-content">
    <p class="placeholder">Click a node to explore</p>
  </div>
</div>

<script>
const DOMAIN_COLORS = {
  "document-conversion": "#4299e1",
  "plugin-architecture":  "#9f7aea",
  "file-detection":       "#f6ad55",
  "media-processing":     "#68d391",
  "web-extraction":       "#fc8181",
  "ai-integration":       "#f687b3",
  "adaptive-parsing":     "#76e4f7",
};
function domainColor(d) { return DOMAIN_COLORS[d] || "#718096"; }

fetch("graph.json")
  .then(r => r.json())
  .then(data => init(data))
  .catch(() => { document.body.innerHTML = '<p style="color:#fc8181;padding:20px">Could not load graph.json — open this file from the repo-brain directory.</p>'; });

function init(data) {
  const nodes = data.nodes.map(n => ({...n}));
  const nodeById = Object.fromEntries(nodes.map(n => [n.id, n]));
  const links = data.edges
    .filter(e => nodeById[e.from] && nodeById[e.to])
    .map(e => ({ source: e.from, target: e.to, type: e.type }));

  // Node radius based on edge count
  const edgeCount = {};
  links.forEach(l => {
    edgeCount[l.source] = (edgeCount[l.source] || 0) + 1;
    edgeCount[l.target] = (edgeCount[l.target] || 0) + 1;
  });
  nodes.forEach(n => { n._r = 8 + Math.sqrt(edgeCount[n.id] || 0) * 4; });

  const svg = d3.select("#svg");
  const container = svg.append("g");

  svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => container.attr("transform", e.transform)));

  const sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(120))
    .force("charge", d3.forceManyBody().strength(-300))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
    .force("collide", d3.forceCollide(d => d._r + 10));

  const link = container.append("g").selectAll("line")
    .data(links).join("line")
    .attr("class", d => `link type-${d.type}`)
    .attr("stroke-width", 1.5);

  const node = container.append("g").selectAll("g")
    .data(nodes).join("g")
    .attr("class", "node")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag",  (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end",   (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }))
    .on("click", (e, d) => showPanel(d));

  node.append("circle")
    .attr("r", d => d._r)
    .attr("fill", d => domainColor(d.domain));

  node.append("text")
    .attr("dy", d => d._r + 12)
    .attr("text-anchor", "middle")
    .text(d => d.label);

  sim.on("tick", () => {
    link.attr("x1", d => d.source.x).attr("y1", d => d.source.y)
        .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
    node.attr("transform", d => `translate(${d.x},${d.y})`);
  });

  // Search
  document.getElementById("search-bar").addEventListener("input", function() {
    const q = this.value.toLowerCase().trim();
    node.classed("dimmed", d => q && !d.label.toLowerCase().includes(q) && !d.domain.toLowerCase().includes(q) && !d.repo.toLowerCase().includes(q));
  });

  function showPanel(d) {
    const panel = document.getElementById("panel-content");
    const baseDir = "../";
    const studyHref = d.study ? baseDir + d.study : null;
    const buildHref = d.build ? baseDir + d.build : null;
    const sourceHref = d.source || null;
    const notebookHref = d.notebooklm || null;

    panel.innerHTML = `
      <div class="panel-title">Feature</div>
      <div class="node-label">${d.label}</div>
      <div class="node-domain">${d.domain} · ${d.repo}</div>
      <div class="node-summary">${d.summary}</div>
      <div class="links-section">
        ${studyHref ? `<a class="btn btn-primary" href="${studyHref}" target="_blank">📖 Study doc</a>` : ''}
        ${buildHref ? `<a class="btn" href="${buildHref}" target="_blank">🔧 Build spec</a>` : ''}
        ${sourceHref ? `<a class="btn" href="${sourceHref}" target="_blank">↗ Origin repo</a>` : ''}
        ${notebookHref ? `<a class="btn" href="${notebookHref}" target="_blank">📓 NotebookLM</a>` : ''}
      </div>
    `;
  }
}
</script>
</body>
</html>
